<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="../css/inicio.css">
</head>
<body>
    <div class="page-container login-space">
        <div class="card">
            <div class="card__header">
                <h1>Criar conta</h1>
            </div>
            <div class="card__content">
                <form onsubmit="validarConta(event)">
                    <label>Nome
                        <input type="text" id="contaNome" required>
                    </label>
                    <label>Email
                        <input type="email" id="contaEmail" required>
                    </label>
                    <label>Senha
                        <input type="password" id="contaSenha" required>
                    </label>
                    <label>Confirmar senha
                        <input type="password" id="contaSenha2" required>
                    </label>
                    <button type="submit">Cadastrar</button>
                </form>
                <div class="meta-links">
                    <a href="../index.html">Voltar ao login</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Configuração Supabase -->
    <script src="../js/config.js"></script>
    
    <!-- Validações -->
    <script src="../js/Validacoes.js"></script>
</body>
</html>
