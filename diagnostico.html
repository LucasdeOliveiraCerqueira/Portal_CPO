<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte Técnico</title>
    <link rel="stylesheet" href="css/inicio.css">
    <style>
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h2 {
            margin-top: 0;
            color: #1f75ff;
            font-size: 1.2rem;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            background: #1f75ff;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        button:hover {
            background: #1a5dcc;
        }
        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .result.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #1f75ff;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Suporte Técnico</h1>
        
        <div class="card">
            <h2>Teste de Login</h2>
            <p style="color: #666; font-size: 14px;">Use suas credenciais para testar se o login está funcionando corretamente.</p>
            <input type="email" id="testEmail" placeholder="seu@email.com">
            <input type="password" id="testPassword" placeholder="sua senha">
            <button onclick="testarLogin()">Testar Login</button>
            <div id="login-result" class="result"></div>
        </div>

        <div class="card">
            <h2>Status da Sessão</h2>
            <p style="color: #666; font-size: 14px;">Verificar se há uma sessão ativa.</p>
            <button onclick="verificarSessao()">Verificar Sessão</button>
            <div id="session-result" class="result"></div>
        </div>

        <div class="back-link">
            <a href="index.html">← Voltar ao login</a>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Configuração Supabase -->
    <script src="js/config.js"></script>
    
    <script>
        async function testarLogin() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const resultEl = document.getElementById('login-result');

            resultEl.className = 'result';
            resultEl.textContent = '';

            if (!email || !password) {
                resultEl.className = 'result error';
                resultEl.textContent = '❌ Preencha email e senha';
                return;
            }

            try {
                resultEl.className = 'result info';
                resultEl.textContent = '⏳ Processando...';

                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    resultEl.className = 'result error';
                    resultEl.textContent = `❌ ${error.message}`;
                } else if (data.session) {
                    resultEl.className = 'result success';
                    resultEl.textContent = `✓ Login bem-sucedido! Bem-vindo, ${data.user.email}`;
                    setTimeout(() => {
                        window.location.href = 'Home.html';
                    }, 1500);
                } else {
                    resultEl.className = 'result error';
                    resultEl.textContent = '❌ Email pode precisar de confirmação. Confira seu Gmail.';
                }
            } catch (e) {
                resultEl.className = 'result error';
                resultEl.textContent = `❌ Erro: ${e.message}`;
            }
        }

        async function verificarSessao() {
            const resultEl = document.getElementById('session-result');
            resultEl.className = 'result info';
            resultEl.textContent = '⏳ Verificando...';

            try {
                const { data: { session }, error } = await window.supabase.auth.getSession();

                if (error) {
                    resultEl.className = 'result error';
                    resultEl.textContent = `❌ Erro: ${error.message}`;
                } else if (session) {
                    resultEl.className = 'result success';
                    resultEl.textContent = `✓ Sessão ativa: ${session.user.email}`;
                } else {
                    resultEl.className = 'result info';
                    resultEl.textContent = '⚠️ Nenhuma sessão ativa';
                }
            } catch (e) {
                resultEl.className = 'result error';
                resultEl.textContent = `❌ Erro: ${e.message}`;
            }
        }
    </script>
</body>
</html>
