<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Portal CPO</title>
    <link rel="stylesheet" href="../../css/Perfil.css">
    <link rel="stylesheet" href="../../botoes_reutilizaveis/botoes_reutilizaveis.css">
</head>
<body>
    <div class="perfil-page">
        <header class="perfil-header">
            <div>
                <h1>Meu Perfil</h1>
                <p>Gerencie seus dados e preferências de estudo.</p>
            </div>
            <a class="btn-voltar" href="../../Home.html">← Voltar ao Home</a>
        </header>

        <main class="perfil-main">
            <section class="perfil-card">
                <div class="perfil-avatar" id="perfilAvatar">👤</div>
                <div class="perfil-info">
                    <h2 id="nome-usuario">Usuário</h2>
                    <p id="email-usuario">email@exemplo.com</p>
                    <div class="upload-photo">
                        <label class="upload-label">
                            Alterar foto
                            <input type="file" accept="image/*" id="avatarFile">
                        </label>
                    </div>
                </div>
            </section>

            <section class="preferencias-card">
                <div class="preferencias-header">
                    <h2>Preferências</h2>
                    <p>Ajuste seu ambiente de estudo.</p>
                </div>

                <form id="preferencias-form">
                    <label class="preferencia-item">
                        <span>Modo escuro</span>
                        <input type="checkbox" id="preferencia-darkmode">
                    </label>

                    <label class="preferencia-item">
                        <span>Notificações ativas</span>
                        <input type="checkbox" id="preferencia-notificacoes">
                    </label>

                    <div class="preferencias-actions">
                        <button class="btn-primario" type="button" onclick="salvarPreferencias()">Salvar preferências</button>
                    </div>
                </form>
            </section>

            <section class="preferencias-card">
                <div class="preferencias-header">
                    <h2>Código de Administrador</h2>
                    <p>Digite o código especial para se tornar administrador.</p>
                </div>

                <form id="codigo-admin-form">
                    <label class="preferencia-item">
                        <span>Código de Admin</span>
                        <input type="password" id="codigo-admin-input" placeholder="Digite o código..." required>
                    </label>

                    <div class="preferencias-actions">
                        <button class="btn-primario" type="button" onclick="aplicarCodigoAdmin()">Aplicar Código</button>
                    </div>
                    <div id="status-codigo" style="margin-top: 10px; padding: 10px; border-radius: 6px; display: none;"></div>
                </form>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script>
        async function carregarPerfil() {
            const { data: { user } } = await window.supabase.auth.getUser();
            if (!user) {
                window.location.href = '../../index.html';
                return;
            }

            document.getElementById('nome-usuario').textContent = user.user_metadata?.nome || user.email.split('@')[0];
            document.getElementById('email-usuario').textContent = user.email;

            const preferencias = JSON.parse(localStorage.getItem('portalCpoPreferencias') || '{}');
            document.getElementById('preferencia-darkmode').checked = preferencias.darkmode || false;
            document.getElementById('preferencia-notificacoes').checked = preferencias.notificacoes || false;

            const avatarUrl = localStorage.getItem('portalCpoAvatar') || user.user_metadata?.avatar_url;
            ajustarAvatar(avatarUrl);
            aplicarTema(preferencias.darkmode);
        }

        function aplicarTema(ativado) {
            if (ativado) {
                document.body.classList.add('tema-escuro');
            } else {
                document.body.classList.remove('tema-escuro');
            }
        }

        function ajustarAvatar(url) {
            const avatar = document.getElementById('perfilAvatar');
            if (!avatar) return;

            if (url) {
                avatar.style.backgroundImage = `url(${url})`;
                avatar.classList.add('foto-personalizada');
                avatar.textContent = '';
            } else {
                avatar.style.backgroundImage = '';
                avatar.classList.remove('foto-personalizada');
                avatar.textContent = '👤';
            }
        }

        async function atualizarAvatar(file) {
            if (!file) return;
            const reader = new FileReader();

            reader.onload = async () => {
                const imageUrl = reader.result;
                ajustarAvatar(imageUrl);
                localStorage.setItem('portalCpoAvatar', imageUrl);

                try {
                    await window.supabase.auth.updateUser({
                        data: { avatar_url: imageUrl }
                    });
                } catch (erro) {
                    console.warn('Não foi possível salvar a foto no Supabase:', erro);
                }
            };

            reader.readAsDataURL(file);
        }

        function salvarPreferencias() {
            const novasPreferencias = {
                darkmode: document.getElementById('preferencia-darkmode').checked,
                notificacoes: document.getElementById('preferencia-notificacoes').checked
            };

            localStorage.setItem('portalCpoPreferencias', JSON.stringify(novasPreferencias));
            aplicarTema(novasPreferencias.darkmode);
            alert('Preferências salvas com sucesso.');
        }

        /**
         * Aplica código de admin ao usuário
         * Código correto: CPO_ADMIN_2024
         */
        async function aplicarCodigoAdmin() {
            const codigoInput = document.getElementById('codigo-admin-input');
            const codigo = codigoInput.value.trim();
            const statusDiv = document.getElementById('status-codigo');
            const CODIGO_CORRETO = 'CPO_ADMIN_2024';

            if (!codigo) {
                mostrarStatus('Por favor, digite o código.', 'erro', statusDiv);
                return;
            }

            if (codigo !== CODIGO_CORRETO) {
                mostrarStatus('❌ Código inválido. Tente novamente.', 'erro', statusDiv);
                codigoInput.value = '';
                return;
            }

            try {
                const { data: { user } } = await window.supabase.auth.getUser();
                
                if (!user) {
                    mostrarStatus('❌ Erro: Usuário não autenticado.', 'erro', statusDiv);
                    return;
                }

                // Atualiza (ou cria) o role na tabela profiles
                const { error } = await window.supabase
                    .from('profiles')
                    .upsert({ id: user.id, role: 'admin' }, { onConflict: 'id' });

                if (error) {
                    console.error('Erro ao atualizar role:', error);
                    mostrarStatus('❌ Erro ao processar código. Tente novamente.', 'erro', statusDiv);
                    return;
                }

                mostrarStatus('✅ Parabéns! Você é agora um administrador! Recarregando...', 'sucesso', statusDiv);
                codigoInput.value = '';

                // Aguarda 2 segundos e redireciona para Home
                setTimeout(() => {
                    window.location.href = '../../Home.html';
                }, 2000);

            } catch (erro) {
                console.error('Erro ao aplicar código:', erro);
                mostrarStatus('❌ Erro inesperado. Tente novamente.', 'erro', statusDiv);
            }
        }

        /**
         * Mostra status de sucesso ou erro
         */
        function mostrarStatus(mensagem, tipo, elemento) {
            elemento.textContent = mensagem;
            elemento.style.display = 'block';
            elemento.style.backgroundColor = tipo === 'sucesso' ? '#d1fae5' : '#fee2e2';
            elemento.style.color = tipo === 'sucesso' ? '#065f46' : '#991b1b';
            elemento.style.borderLeft = `4px solid ${tipo === 'sucesso' ? '#10b981' : '#ef4444'}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarPerfil();
            const avatarFile = document.getElementById('avatarFile');
            if (avatarFile) {
                avatarFile.addEventListener('change', event => {
                    atualizarAvatar(event.target.files[0]);
                });
            }
        });
    </script>
</body>
</html>
