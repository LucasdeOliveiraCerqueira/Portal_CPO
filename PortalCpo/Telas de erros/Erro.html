<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Portal CPO</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #1f2937;
        }
        .error-card {
            width: min(520px, 90vw);
            padding: 32px;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            text-align: center;
        }
        .error-card h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .error-card p {
            color: #4b5563;
            margin-bottom: 24px;
            line-height: 1.7;
        }
        .error-card a {
            display: inline-flex;
            padding: 12px 24px;
            border-radius: 999px;
            text-decoration: none;
            background: #1f75ff;
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <h1 id="error-title">Erro</h1>
        <p id="error-message">Algo deu errado. Tente novamente em instantes.</p>
        <a id="error-back" href="../index.html">Voltar ao início</a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Erro';
        const msg = params.get('msg') || 'Algo deu errado. Tente novamente em instantes.';
        const back = params.get('back');
        document.getElementById('error-title').textContent = title;
        document.getElementById('error-message').textContent = msg;
        if (back) {
            document.getElementById('error-back').href = decodeURIComponent(back);
        }
    </script>
</body>
</html>
