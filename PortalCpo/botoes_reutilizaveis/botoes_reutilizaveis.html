<!-- botoes_reutilizaveis.html
     BIBLIOTECA DE TEMPLATES REUTILIZÁVEIS
     Copie e cole conforme necessário no seu projeto
-->

<!-- ========== 1. BOTÃO VOLTAR ========== -->
<!-- Use este padrão para colocar um botão voltar em qualquer lugar da página -->
<!-- COPIE ISTO: -->
<div class="btn-container-top">
    <button class="btn-voltar" onclick="voltarParaMaterias()">← Voltar</button>
</div>
<!-- FIM DO TEMPLATE -->

<!-- ========== 2. BOTÃO PRIMÁRIO ========== -->
<!-- Use para ações principais (ex: Confirmar, Enviar, etc) -->
<!-- COPIE ISTO: -->
<button class="btn-primario" onclick="suaFuncao()">Ação Principal</button>
<!-- FIM DO TEMPLATE -->

<!-- ========== 3. SEÇÃO COMPLETA DE MATÉRIA ========== -->
<!-- Cole isto no seu arquivo HTML de matéria (ex: Historia.html) -->
<!-- COPIE ISTO: -->
<section id="sua_materia" class="secao">
    <div class="btn-container-top">
        <button class="btn-voltar" onclick="voltarParaMaterias()">← Voltar</button>
    </div>

    <div class="content-header">
        <h1>Nome da Matéria</h1>
        <p>Descrição breve da matéria</p>
    </div>

    <!-- GRID COM SUBMATÉRIAS/CONTEÚDOS -->
    <div class="cards-grid">
        <!-- ADICIONE CARDS AQUI (veja template abaixo) -->
    </div>
</section>
<!-- FIM DO TEMPLATE -->

<!-- ========== 4. CARD DE SUBMATÉRIA ========== -->
<!-- Cole isto dentro de <div class="cards-grid"> acima -->
<!-- COPIE ISTO: -->
<div class="card" onclick="abrirSubmateria('NomeDaSubmateria')">
    <div class="card-icon">📚</div>
    <div class="card-title">Nome do Tópico</div>
</div>
<!-- FIM DO TEMPLATE - COPIE QUANTAS VEZES PRECISAR -->

<!-- ========== 5. COMO ADICIONAR UMA NOVA MATÉRIA ========== -->
<!-- Passo 1: Crie um arquivo em /materias/NomeDaMateria.html -->
<!-- Passo 2: Cole o template de SEÇÃO COMPLETA (item 3) nele -->
<!-- Passo 3: No Home.html, adicione um card assim: -->
<!-- COPIE ISTO para Home.html dentro de <div class="cards-grid">: -->
<div class="card" onclick="abrirMateria('NomeDaMateria')">
    <div class="card-icon">🎓</div>
    <div class="card-title">Nome da Nova Matéria</div>
</div>
<!-- FIM DO TEMPLATE -->

<!-- ========== 6. FUNÇÃO JAVASCRIPT PARA SUBMATÉRIAS ========== -->
<!-- Cole isto no <script> do seu arquivo HTML de matéria -->
<script>
    /**
     * Abre uma submatéria ao clicar em um card
     * Cole isto no seu arquivo de matéria (ex: Historia.html)
     * @param {string} nomeSubmateria - Nome da submatéria
     */
    function abrirSubmateria(nomeSubmateria) {
        alert('Abrindo: ' + nomeSubmateria);
        // TODO: Implementar carregamento de submatéria
    }

    /**
     * Volta para a página inicial de matérias
     */
    function voltarParaMaterias() {
        location.reload();
    }
</script>
<!-- FIM DO TEMPLATE -->
